name: Generate Real Estate Blog Posts

on:
  schedule:
    - cron: "0 12,13 * * 1,5"
  workflow_dispatch:
    inputs:
      post_type:
        description: "Choose article type"
        required: true
        default: "auto"
        type: choice
        options:
          - auto
          - residential
          - commercial

permissions:
  contents: write

jobs:
  generate-post:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Generate article page and RSS feed
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          POST_TYPE: ${{ github.event.inputs.post_type || 'auto' }}
        run: python scripts/generate_feed.py
      - name: Commit updated blog files
        run: |
          git config user.name "DMSellsRE Blog Bot"
          git config user.email "actions@github.com"
          git add feed.xml posts.json index.html posts/
          git commit -m "Generate new real estate blog article" || echo "No changes to commit"
          git push
